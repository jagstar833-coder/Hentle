name: Daily Hentle Reminder

on:
  schedule:
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  post-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Send reminder
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          DATE=$(TZ='America/Chicago' date '+%B %-d, %Y')
          curl -s -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"­ččę Daily Hentle\",\"description\":\"**$DATE**\n\nÔČŤÔČŤÔČŤÔČŤÔČŤ\nÔČŤÔČŤÔČŤÔČŤÔČŤ\nÔČŤÔČŤÔČŤÔČŤÔČŤ\nÔČŤÔČŤÔČŤÔČŤÔČŤ\nÔČŤÔČŤÔČŤÔČŤÔČŤ\nÔČŤÔČŤÔČŤÔČŤÔČŤ\n\nCan you guess today's word in 6 tries?\n\n[Play Hentle](https://hentle.mom)\",\"color\":5477454,\"footer\":{\"text\":\"hentle.mom\"}}]}"
