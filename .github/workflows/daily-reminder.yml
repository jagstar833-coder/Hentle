name: Daily Hentle Reminder

on:
  schedule:
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  post-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Send reminder
        env:
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          DATE=$(TZ='America/Chicago' date '+%B %-d, %Y')
          curl -s -X POST "https://discord.com/api/v10/channels/$CHANNEL_ID/messages" -H "Authorization: Bot $BOT_TOKEN" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"🟩 Daily Hentle\",\"description\":\"**$DATE**\n\n⬛⬛⬛⬛⬛\n⬛⬛⬛⬛⬛\n⬛⬛⬛⬛⬛\n⬛⬛⬛⬛⬛\n⬛⬛⬛⬛⬛\n⬛⬛⬛⬛⬛\n\nCan you guess today's word in 6 tries?\",\"color\":5477454,\"footer\":{\"text\":\"hentle.mom\"}}],\"components\":[{\"type\":1,\"components\":[{\"type\":2,\"style\":5,\"label\":\"▶  Play Hentle\",\"url\":\"https://hentle.mom\"}]}]}"
